name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # Use a PAT (or GitHub App token) so the release event fires the
          # downstream `release.yml` workflow. Releases created with the
          # default GITHUB_TOKEN do not trigger other workflows.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
